<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор — Vue</title>
  <script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen p-5 font-sans bg-slate-100">
  <main id="app" class="max-w-sm mx-auto">
    <h1 class="sr-only">Калькулятор</h1>

    <label for="calc-display" class="sr-only">Результат и ввод выражения</label>
    <input id="calc-display"
      class="w-full h-12 text-2xl text-right mb-3 p-3 border border-slate-300 rounded-lg bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
      type="text" v-model="display" readonly autocomplete="off" aria-readonly="true" />

    <section class="grid grid-cols-4 gap-2" aria-label="Клавиши калькулятора">
      <button v-for="(btn, index) in buttons" :key="index" type="button" :class="getButtonClass(btn.variant)"
        :aria-label="btn.ariaLabel" @click="onButtonClick(btn.value)">{{ btn.label }}</button>
    </section>

    <section class="mt-6" aria-label="История вычислений">
      <h2 class="text-sm font-medium text-slate-600 mb-2">История</h2>
      <ul class="space-y-1.5 text-sm text-slate-700">
        <li v-for="item in history" :key="item.id" class="truncate">
          {{ item.expression }} = {{ item.result }}
        </li>
        <li v-if="history.length === 0" class="text-slate-400">Пока пусто</li>
      </ul>
    </section>
  </main>
  <script src="app.js"></script>
</body>

</html>
